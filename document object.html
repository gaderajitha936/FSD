<!DOCTYPE html>
<html>
<head>
    <title>Document Properties Example</title>
</head>
<body>

<h2 id="demo">Hello World</h2>

<button onclick="changeContent()">Click Me</button>

<script>
    document.title = "My Web Page";

    document.write("<p>This is written using document.write()</p>");

    function changeContent() {
        document.getElementById("demo").innerHTML = "Content Changed!";

        document.bgColor = "lightblue";
    }
</script>

</body>
</html>
