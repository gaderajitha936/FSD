<!DOCTYPE html>
<html>
<head>
    <title>HTML Semantic Tags Example</title>
    <style>
        body { font-family: Arial; }
        header, nav, footer { background-color: #e0e0e0; padding: 10px;}
        section {margin: 10px; }
        aside { background-color: #f9f9f9; padding: 10px; width: 30%; float: right; }
    </style>
</head>
<body>

  <header>
    <h1>My Website</h1>
  </header>

  <nav>
    <a href="#">Home</a> |
    <a href="#">About</a> |
    <a href="#">Contact</a>
  </nav>

  <main>

      <section>
        <article>
          <h2>HTML Article</h2>
            <p>This is an <span>article</span> inside a section.</p>

            <figure>
              <img src="image.webp" alt="Sample Image" width="200" height="200">
              <figcaption>Sample image with caption</figcaption>
            </figure>
         </article>
      </section>

      <aside>
        <h3>Side content</h3>
        <p>This content is related to the main article.</p>
      </aside>
      
      <div>
        <p>This is a div element.</p>
    </div>

    </main>

      <footer>
        <p>&copy; 2026 My Website.</p>
      </footer>

</body>
</html>
