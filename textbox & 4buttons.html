<!DOCTYPE html>
<html>
<head>
<title>Number Operations</title>

<script>

function factorial() {
    let n = document.getElementById("num").value;
    let fact = 1;

    for (let i = 1; i <= n; i++) {
        fact = fact * i;
    }

    document.getElementById("result").innerHTML = "Factorial = " + fact;
}

function fibonacci() {
    let n = document.getElementById("num").value;
    let a = 0, b = 1, c;
    let series = "0 1 ";

    for (let i = 2; i < n; i++) {
        c = a + b;
        series += c + " ";
        a = b;
        b = c;
    }

    document.getElementById("result").innerHTML = "Fibonacci Series: " + series;
}

function prime() {
    let n = document.getElementById("num").value;
    let output = "";

    for (let i = 2; i <= n; i++) {
        let flag = 0;

        for (let j = 2; j <= i / 2; j++) {
            if (i % j == 0) {
                flag = 1;
                break;
            }
        }

        if (flag == 0) {
            output += i + " ";
        }
    }

    document.getElementById("result").innerHTML = "Prime Numbers: " + output;
}

function palindrome() {
    let n = document.getElementById("num").value;
    let temp = n;
    let rev = 0;

    while (n > 0) {
        let r = n % 10;
        rev = rev * 10 + r;
        n = Math.floor(n / 10);
    }

    if (temp == rev)
        document.getElementById("result").innerHTML = temp + " is Palindrome";
    else
        document.getElementById("result").innerHTML = temp + " is Not Palindrome";
}

</script>
</head>

<body>

<h2>Number Operations</h2>

Enter a number:
<input type="text" id="num"><br><br>

<button onclick="factorial()">Factorial</button>
<button onclick="fibonacci()">Fibonacci</button>
<button onclick="prime()">Prime</button>
<button onclick="palindrome()">Palindrome</button>

<p id="result"></p>

</body>
</html>
