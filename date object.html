<!DOCTYPE html>
<html>
<head>
    <title>Date Object Example</title>
</head>
<body>

<h2>Date Object Demo</h2>
<p id="demo"></p>

<button onclick="dateDemo()">Click Me</button>

<script>
function dateDemo() {
    let today = new Date();

    let day = today.getDate();          
    let month = today.getMonth() + 1;   
    let year = today.getFullYear();     
    let hours = today.getHours();       

    let fullDate = today.toLocaleDateString(); 

    document.getElementById("demo").innerHTML =
        "Current Date: " + fullDate + "<br>" +
        "Day: " + day + "<br>" +
        "Month: " + month + "<br>" +
        "Year: " + year + "<br>" +
        "Hours: " + hours;
}
</script>

</body>
</html>
