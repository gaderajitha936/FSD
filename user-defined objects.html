<!DOCTYPE html>
<html>
<head>
    <title>User Defined Object Example</title>
</head>
<body>

<h2>User Defined Object Demo</h2>
<p id="demo"></p>

<button onclick="showDetails()">Click Me</button>

<script>
    function Student(name, age, marks) {
        this.name = name;
        this.age = age;
        this.marks = marks;

        this.display = function() {
            return "Name: " + this.name + 
                   "<br>Age: " + this.age + 
                   "<br>Marks: " + this.marks;
        };
    }

    let s1 = new Student("Ram", 19, 85);

    Object.defineProperty(s1, "grade", {
        get: function() {
            if (this.marks >= 90) return "A";
            else if (this.marks >= 75) return "B";
            else return "C";
        },
        set: function(value) {
            this.marks = value;
        }
    });

    function showDetails() {
        document.getElementById("demo").innerHTML =
            s1.display() + "<br>Grade: " + s1.grade;
    }
</script>

</body>
</html>
