<!DOCTYPE html>
<html>
<head>
<title>Week Days using Switch Case</title>
<script>
function showDay() {
    var day = parseInt(prompt("Enter a number (1-7):"));
    var result;

    switch(day) {
        case 1:
            result = "Sunday";
            break;
        case 2:
            result = "Monday";
            break;
        case 3:
            result = "Tuesday";
            break;
        case 4:
            result = "Wednesday";
            break;
        case 5:
            result = "Thursday";
            break;
        case 6:
            result = "Friday";
            break;
        case 7:
            result = "Saturday";
            break;
        default:
            result = "Invalid Day";
    }

    document.write("<h1>Day: " + result +"</h1>");
}
</script>
</head>

<body onload="showDay()">
</body>
</html>
